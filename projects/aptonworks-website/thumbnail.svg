  <rect x="630" y="465" width="80" height="32" rx="16" fill="#d438ff" fill-opacity="0.1" stroke="#d438ff" stroke-opacity="0.25" stroke-width="1"/>
  <text x="670" y="486" text-anchor="middle" font-family="'Inter',sans-serif" font-size="13" fill="#d438ff" font-weight="600">AI/ML</text>
