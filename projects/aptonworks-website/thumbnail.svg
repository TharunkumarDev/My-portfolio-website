<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="aw1" cx="25%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#4542ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aw2" cx="75%" cy="65%" r="50%">
      <stop offset="0%" stop-color="#d438ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aw3" cx="50%" cy="20%" r="40%">
